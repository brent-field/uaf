{% extends "base.html" %}
{% block title %}{{ title }} — UAF Spreadsheet{% endblock %}
{% block content %}
<div class="card">
    <div class="editor-header">
        <form hx-post="/artifacts/{{ artifact_id }}/rename"
              hx-target="#grid-content"
              hx-swap="innerHTML"
              style="flex:1;display:flex;gap:0.5rem;align-items:center;">
            <input type="text" name="title" value="{{ title }}"
                   class="editor-title"
                   hx-trigger="change"
                   hx-post="/artifacts/{{ artifact_id }}/grid/rename"
                   hx-target="#grid-content"
                   hx-swap="innerHTML"
                   hx-include="this" />
        </form>
        <a href="/dashboard" class="btn btn-sm">Back</a>
        <a href="/api/artifacts/{{ artifact_id }}/export?format=csv" class="btn btn-sm">Export .csv</a>
        <button class="btn btn-sm no-print" onclick="window.print()">Print</button>
    </div>

    {% if sheet_id %}
    <div class="grid-toolbar">
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/grid/add-row"
                hx-target="#grid-content"
                hx-swap="innerHTML">+ Row</button>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/grid/add-col"
                hx-target="#grid-content"
                hx-swap="innerHTML">+ Column</button>
        <button class="btn btn-sm btn-danger"
                hx-post="/artifacts/{{ artifact_id }}/grid/delete-row"
                hx-target="#grid-content"
                hx-swap="innerHTML"
                hx-confirm="Delete last row?">- Row</button>
        <button class="btn btn-sm btn-danger"
                hx-post="/artifacts/{{ artifact_id }}/grid/delete-col"
                hx-target="#grid-content"
                hx-swap="innerHTML"
                hx-confirm="Delete last column?">- Column</button>
        <span class="htmx-indicator">Saving...</span>
    </div>
    {% endif %}

    <div id="grid-content" class="grid-content">
        {% include "partials/grid_table.html" %}
    </div>
</div>

<div id="cell-edit-modal"></div>

<script>
document.body.addEventListener('click', function(e) {
    var td = e.target.closest('td[data-row][data-col]');
    if (!td) return;
    var nodeId = td.getAttribute('data-node-id');
    var row = td.getAttribute('data-row');
    var col = td.getAttribute('data-col');
    var currentVal = td.textContent.trim();
    var artifactId = '{{ artifact_id }}';
    var modal = document.getElementById('cell-edit-modal');

    if (nodeId) {
        modal.innerHTML =
            '<div class="cell-edit-overlay" onclick="if(event.target===this)this.remove()">' +
            '<form class="cell-edit-form" hx-post="/artifacts/' + artifactId + '/grid/set-cell" ' +
            'hx-target="#grid-content" hx-swap="innerHTML">' +
            '<h4>Edit Cell</h4>' +
            '<input type="hidden" name="cell_id" value="' + nodeId + '" />' +
            '<input type="text" name="value" value="' + currentVal.replace(/"/g, '&quot;') + '" autofocus />' +
            '<div class="cell-edit-actions">' +
            '<button type="button" class="btn btn-sm" onclick="this.closest(\'.cell-edit-overlay\').remove()">Cancel</button>' +
            '<button type="submit" class="btn btn-sm btn-primary">Save</button>' +
            '</div></form></div>';
    } else {
        modal.innerHTML =
            '<div class="cell-edit-overlay" onclick="if(event.target===this)this.remove()">' +
            '<form class="cell-edit-form" hx-post="/artifacts/' + artifactId + '/grid/create-cell" ' +
            'hx-target="#grid-content" hx-swap="innerHTML">' +
            '<h4>Edit Cell</h4>' +
            '<input type="hidden" name="row" value="' + row + '" />' +
            '<input type="hidden" name="col" value="' + col + '" />' +
            '<input type="text" name="value" value="" autofocus />' +
            '<div class="cell-edit-actions">' +
            '<button type="button" class="btn btn-sm" onclick="this.closest(\'.cell-edit-overlay\').remove()">Cancel</button>' +
            '<button type="submit" class="btn btn-sm btn-primary">Save</button>' +
            '</div></form></div>';
    }
    htmx.process(modal);
});
</script>
{% endblock %}
