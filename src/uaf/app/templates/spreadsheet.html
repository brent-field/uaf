{% extends "base.html" %}
{% block title %}{{ title }} — UAF Spreadsheet{% endblock %}
{% block content %}
<div class="card">
    <div class="editor-header">
        <form hx-post="/artifacts/{{ artifact_id }}/rename"
              hx-target="#grid-content"
              hx-swap="innerHTML"
              style="flex:1;display:flex;gap:0.5rem;align-items:center;">
            <input type="text" name="title" value="{{ title }}"
                   class="editor-title"
                   hx-trigger="change"
                   hx-post="/artifacts/{{ artifact_id }}/grid/rename"
                   hx-target="#grid-content"
                   hx-swap="innerHTML"
                   hx-include="this" />
        </form>
        <a href="/dashboard" class="btn btn-sm">Back</a>
        <a href="/api/artifacts/{{ artifact_id }}/export?format=csv" class="btn btn-sm">Export .csv</a>
        <button class="btn btn-sm no-print" onclick="window.print()">Print</button>
    </div>

    {% if sheet_id %}
    <div class="grid-toolbar">
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/grid/add-row"
                hx-target="#grid-content"
                hx-swap="innerHTML">+ Row</button>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/grid/add-col"
                hx-target="#grid-content"
                hx-swap="innerHTML">+ Column</button>
        <span class="htmx-indicator">Saving...</span>
    </div>
    {% endif %}

    <div id="grid-content" class="grid-content" data-artifact-id="{{ artifact_id }}" data-sheet-id="{{ sheet_id }}">
        {% include "partials/grid_table.html" %}
    </div>
</div>

<script>
(function() {
    var artifactId = '{{ artifact_id }}';
    var activeInput = null;
    var pendingCell = null;  // {row, col} to activate after HTMX swap

    // After HTMX replaces the grid, activate the pending cell
    document.body.addEventListener('htmx:afterSwap', function(e) {
        if (!e.detail.target || e.detail.target.id !== 'grid-content') return;
        if (!pendingCell) return;
        var row = pendingCell.row;
        var col = pendingCell.col;
        pendingCell = null;
        var td = document.querySelector(
            'td[data-row="' + row + '"][data-col="' + col + '"]'
        );
        if (td) activateCell(td);
    });

    document.body.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter' || activeInput) return;
        var focused = document.activeElement;
        if (!focused || !focused.matches('td[data-row][data-col]')) return;
        e.preventDefault();
        var nextRow = parseInt(focused.getAttribute('data-row'), 10) + 1;
        var col = focused.getAttribute('data-col');
        var next = document.querySelector(
            'td[data-row="' + nextRow + '"][data-col="' + col + '"]'
        );
        if (next) { next.focus(); next.click(); }
    });

    function commitCell(td, input) {
        if (!input || input !== activeInput) return;
        activeInput = null;
        var val = input.value;
        var nodeId = td.getAttribute('data-node-id');
        var row = td.getAttribute('data-row');
        var col = td.getAttribute('data-col');

        if (nodeId) {
            htmx.ajax('POST', '/artifacts/' + artifactId + '/grid/set-cell', {
                target: '#grid-content',
                swap: 'innerHTML',
                values: { cell_id: nodeId, value: val }
            });
        } else {
            htmx.ajax('POST', '/artifacts/' + artifactId + '/grid/create-cell', {
                target: '#grid-content',
                swap: 'innerHTML',
                values: { row: row, col: col, value: val }
            });
        }
    }

    function cancelCell(td, input) {
        if (!input || input !== activeInput) return;
        activeInput = null;
        td.textContent = td.getAttribute('data-original') || '';
        td.removeAttribute('data-original');
    }

    function activateCell(td) {
        if (activeInput && activeInput.closest('td') === td) return;
        if (activeInput) {
            var prevTd = activeInput.closest('td');
            if (prevTd) commitCell(prevTd, activeInput);
        }

        var formula = td.getAttribute('data-formula');
        var currentVal = formula || td.textContent.trim();
        td.setAttribute('data-original', td.textContent.trim());

        var input = document.createElement('input');
        input.type = 'text';
        input.value = currentVal;
        input.className = 'cell-inline-input';
        td.textContent = '';
        td.appendChild(input);
        activeInput = input;
        input.focus();
        input.select();

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                var nextRow = parseInt(td.getAttribute('data-row'), 10) + 1;
                pendingCell = { row: nextRow, col: td.getAttribute('data-col') };
                commitCell(td, input);
            } else if (e.key === 'Escape') {
                e.preventDefault();
                cancelCell(td, input);
            } else if (e.key === 'Tab') {
                e.preventDefault();
                var nextCol = parseInt(td.getAttribute('data-col'), 10)
                    + (e.shiftKey ? -1 : 1);
                pendingCell = { row: td.getAttribute('data-row'), col: nextCol };
                commitCell(td, input);
            }
        });

        input.addEventListener('blur', function() {
            setTimeout(function() {
                if (activeInput === input) commitCell(td, input);
            }, 100);
        });
    }

    document.body.addEventListener('click', function(e) {
        var td = e.target.closest('td[data-row][data-col]');
        if (!td) return;
        if (e.target.tagName === 'INPUT') return;
        if (activeInput) {
            // Commit current cell, then activate clicked cell after swap
            pendingCell = {
                row: td.getAttribute('data-row'),
                col: td.getAttribute('data-col'),
            };
            var prevTd = activeInput.closest('td');
            if (prevTd) commitCell(prevTd, activeInput);
        } else {
            activateCell(td);
        }
    });
})();
</script>
{% endblock %}
