{% extends "base.html" %}
{% block title %}{{ title }} — UAF Project{% endblock %}
{% block content %}
<div class="card">
    <div class="editor-header">
        <form hx-post="/artifacts/{{ artifact_id }}/flow/rename"
              hx-target="#flow-content"
              hx-swap="innerHTML"
              style="flex:1;display:flex;gap:0.5rem;align-items:center;">
            <input type="text" name="title" value="{{ title }}"
                   class="editor-title"
                   hx-trigger="change"
                   hx-post="/artifacts/{{ artifact_id }}/flow/rename"
                   hx-target="#flow-content"
                   hx-swap="innerHTML"
                   hx-include="this" />
        </form>
        <div class="header-actions">
            <a href="/dashboard" class="btn btn-sm">Back</a>
        </div>
    </div>

    <div class="toolbar">
        <div class="view-toggle">
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'gantt' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=gantt"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                Gantt</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'deps' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=deps"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                Dependencies</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'dag' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=dag"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                DAG</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'kanban' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=kanban"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                Kanban</button>
        </div>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm"
                onclick="document.getElementById('add-task-form').style.display='flex'">
            + Task</button>
        <span class="htmx-indicator">Saving...</span>
    </div>

    <div id="add-task-form" class="add-task-form" style="display:none;">
        <form hx-post="/artifacts/{{ artifact_id }}/flow/create-task"
              hx-target="#flow-content"
              hx-swap="innerHTML"
              style="display:flex;gap:0.5rem;align-items:center;width:100%;">
            <input type="text" name="title" placeholder="Task title" required
                   class="edit-input" style="flex:1;" />
            <input type="date" name="start_date" class="edit-input" style="width:auto;" />
            <input type="date" name="end_date" class="edit-input" style="width:auto;" />
            <button type="submit" class="btn btn-sm btn-primary">Add</button>
            <button type="button" class="btn btn-sm"
                    onclick="this.closest('.add-task-form').style.display='none'">Cancel</button>
        </form>
    </div>

    <div id="drag-feedback" class="drag-feedback" style="display:none;">
        <span id="drag-feedback-text"></span>
    </div>

    <div id="drag-line" class="drag-line" style="display:none;"></div>

    <div id="flow-content" class="flow-content">
        {{ flow_html | safe }}
    </div>
</div>

<script>
(function() {
    var artifactId = '{{ artifact_id }}';
    var content = document.getElementById('flow-content');
    var feedback = document.getElementById('drag-feedback');
    var feedbackText = document.getElementById('drag-feedback-text');
    var line = document.getElementById('drag-line');

    var dragging = false;
    var sourceRow = null;
    var sourceId = null;

    // --- Mousedown on .drag-handle starts the link gesture ---
    content.addEventListener('mousedown', function(e) {
        var handle = e.target.closest('.drag-handle');
        if (!handle) return;
        var row = handle.closest('[data-node-id]');
        if (!row) return;
        e.preventDefault();
        dragging = true;
        sourceRow = row;
        sourceId = row.getAttribute('data-node-id');
        row.classList.add('drag-source');
        feedback.style.display = 'flex';
        feedbackText.textContent = 'Release on another task to create dependency...';
        line.style.display = 'block';
        var rect = handle.getBoundingClientRect();
        var cRect = content.closest('.card').getBoundingClientRect();
        line.style.left = (rect.left + rect.width / 2 - cRect.left) + 'px';
        line.style.top = (rect.top + rect.height / 2 - cRect.top) + 'px';
        line.style.width = '0px';
        line.style.transform = 'rotate(0deg)';
    });

    // --- Mousemove: draw line + highlight targets ---
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        // Update line
        var handleRect = sourceRow.querySelector('.drag-handle').getBoundingClientRect();
        var cRect = content.closest('.card').getBoundingClientRect();
        var x1 = handleRect.left + handleRect.width / 2 - cRect.left;
        var y1 = handleRect.top + handleRect.height / 2 - cRect.top;
        var x2 = e.clientX - cRect.left;
        var y2 = e.clientY - cRect.top;
        var dx = x2 - x1, dy = y2 - y1;
        var len = Math.sqrt(dx * dx + dy * dy);
        var angle = Math.atan2(dy, dx) * 180 / Math.PI;
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.width = len + 'px';
        line.style.transform = 'rotate(' + angle + 'deg)';

        // Highlight drop target
        content.querySelectorAll('.drop-target').forEach(function(el) {
            el.classList.remove('drop-target');
        });
        var target = document.elementFromPoint(e.clientX, e.clientY);
        if (target) {
            var row = target.closest('[data-node-id]');
            if (row && row.getAttribute('data-node-id') !== sourceId) {
                row.classList.add('drop-target');
            }
        }
    });

    // --- Mouseup: complete or cancel ---
    document.addEventListener('mouseup', function(e) {
        if (!dragging) return;
        var target = document.elementFromPoint(e.clientX, e.clientY);
        var targetRow = target ? target.closest('[data-node-id]') : null;
        var targetId = targetRow ? targetRow.getAttribute('data-node-id') : null;

        if (targetId && targetId !== sourceId) {
            // Create dependency: source depends on target
            var form = document.createElement('form');
            form.style.display = 'none';
            form.setAttribute('hx-post',
                '/artifacts/' + artifactId + '/flow/set-dependency');
            form.setAttribute('hx-target', '#flow-content');
            form.setAttribute('hx-swap', 'innerHTML');
            var s = document.createElement('input');
            s.name = 'source_id'; s.value = sourceId;
            var t = document.createElement('input');
            t.name = 'target_id'; t.value = targetId;
            form.appendChild(s);
            form.appendChild(t);
            document.body.appendChild(form);
            htmx.process(form);
            htmx.trigger(form, 'submit');
            setTimeout(function() { form.remove(); }, 500);
        }
        cleanup();
    });

    // --- Escape key cancels ---
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && dragging) cleanup();
    });

    function cleanup() {
        dragging = false;
        sourceRow = null;
        sourceId = null;
        feedback.style.display = 'none';
        line.style.display = 'none';
        content.querySelectorAll('.drag-source').forEach(function(el) {
            el.classList.remove('drag-source');
        });
        content.querySelectorAll('.drop-target').forEach(function(el) {
            el.classList.remove('drop-target');
        });
    }
})();
</script>

<style>
.flow-content { padding: 1rem 0; }
.add-task-form { padding: 0.75rem 1rem; background: var(--bg-secondary, #f5f5f5); border-radius: 4px; margin-bottom: 0.5rem; }

/* Empty state */
.flow-empty { padding: 2rem; text-align: center; color: #888; }
.flow-empty p { margin: 0.25rem 0; }
.flow-empty-hint { font-size: 0.9rem; color: #aaa; }

/* Drag feedback banner */
.drag-feedback {
    padding: 0.5rem 1rem;
    background: #dbeafe;
    border: 1px solid #93c5fd;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    align-items: center;
    font-size: 0.9rem;
    color: #1e40af;
}

/* Drag handle */
.drag-handle {
    cursor: grab; display: inline-block; margin-right: 0.4rem;
    padding: 0.1rem 0.2rem; font-size: 0.85rem; opacity: 0.4;
    user-select: none; border-radius: 3px;
}
.drag-handle:hover { opacity: 1; background: #e0e7ff; }
[data-node-id].drag-source { background: #dbeafe !important; outline: 2px solid #3b82f6; }
[data-node-id].drop-target { background: #d1fae5 !important; outline: 2px dashed #22c55e; }

/* Drag connector line */
.drag-line {
    position: absolute; height: 2px; background: #3b82f6;
    transform-origin: 0 50%; pointer-events: none; z-index: 100;
}

/* Dependency info in Gantt */
.task-dep-info {
    display: block; font-size: 0.75rem; color: #888;
    font-weight: normal; font-style: italic;
}

/* Dependency chips in deps view */
.dep-chip {
    display: inline-flex; align-items: center; gap: 0.25rem;
    background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 4px;
    padding: 0.1rem 0.4rem; font-size: 0.8rem; margin-right: 0.25rem;
}
.dep-remove {
    background: none; border: none; cursor: pointer; color: #999;
    font-size: 0.9rem; padding: 0 0.15rem; line-height: 1;
}
.dep-remove:hover { color: #e11d48; }

/* Gantt */
.flow-gantt { width: 100%; border-collapse: collapse; }
.flow-gantt th, .flow-gantt td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; text-align: left; }
.flow-gantt th { font-weight: 600; font-size: 0.85rem; color: #666; }
.task-name { white-space: nowrap; }
.task-name.status-done { text-decoration: line-through; color: #999; }
.task-name.status-in_progress { color: #2563eb; font-weight: 500; }
.gantt-cell { min-width: 200px; }
.gantt-bar { height: 20px; background: #3b82f6; border-radius: 3px; min-width: 40px; }
.gantt-bar.status-done { background: #22c55e; }
.gantt-bar.status-in_progress { background: #f59e0b; }
.gantt-milestone { font-size: 1.2rem; color: #e11d48; }

/* Dependencies */
.flow-deps { width: 100%; border-collapse: collapse; }
.flow-deps th, .flow-deps td { padding: 0.5rem 0.75rem; border-bottom: 1px solid #eee; text-align: left; }
.flow-deps th { font-weight: 600; font-size: 0.85rem; color: #666; }

/* DAG */
.flow-dag { display: flex; flex-direction: column; gap: 0.5rem; padding: 1rem; }
.dag-node { padding: 0.5rem 1rem; background: #f0f0f0; border: 2px solid #ccc; border-radius: 8px; display: inline-block; }
.dag-label { font-weight: 500; }

/* Kanban */
.flow-kanban { display: flex; gap: 1rem; min-height: 200px; }
.kanban-column { flex: 1; background: #f8f8f8; border-radius: 8px; padding: 0.75rem; }
.kanban-column h3 { margin: 0 0 0.75rem 0; font-size: 0.9rem; color: #666; text-transform: uppercase; letter-spacing: 0.05em; }
.kanban-card { background: white; border: 1px solid #e0e0e0; border-radius: 6px; padding: 0.75rem; margin-bottom: 0.5rem; }
.kanban-card:hover { border-color: #3b82f6; }
.card-title { font-weight: 500; }
.due-date { display: block; font-size: 0.8rem; color: #888; margin-top: 0.25rem; }
.kanban-toggle { float: right; padding: 0 0.3rem; font-size: 0.75rem; }
.kanban-empty { color: #aaa; font-size: 0.85rem; text-align: center; padding: 1rem; }

/* Task actions row */
.flow-gantt tr:hover, .flow-deps tr:hover { background: #f8f8f8; }
.task-actions { white-space: nowrap; }
.task-actions .btn { padding: 0.15rem 0.4rem; font-size: 0.75rem; }
</style>
{% endblock %}
