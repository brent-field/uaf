{% extends "base.html" %}
{% block title %}{{ title }} — UAF Project{% endblock %}
{% block content %}
<div class="card">
    <div class="editor-header">
        <form hx-post="/artifacts/{{ artifact_id }}/flow/rename"
              hx-target="#flow-content"
              hx-swap="innerHTML"
              style="flex:1;display:flex;gap:0.5rem;align-items:center;">
            <input type="text" name="title" value="{{ title }}"
                   class="editor-title"
                   hx-trigger="change"
                   hx-post="/artifacts/{{ artifact_id }}/flow/rename"
                   hx-target="#flow-content"
                   hx-swap="innerHTML"
                   hx-include="this" />
        </form>
        <div class="header-actions">
            <a href="/dashboard" class="btn btn-sm">Back</a>
        </div>
    </div>

    <div class="toolbar">
        <div class="view-toggle">
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'gantt' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=gantt"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                Gantt</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'list' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=list"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                List</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'deps' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=deps"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                Dependencies</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'dag' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=dag"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                DAG</button>
            <button class="btn btn-sm view-mode-btn {% if view_mode == 'kanban' %}active{% endif %}"
                    hx-get="/artifacts/{{ artifact_id }}/flow/view?mode=kanban"
                    hx-target="#flow-content"
                    hx-swap="innerHTML"
                    onclick="document.querySelectorAll('.view-mode-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');">
                Kanban</button>
        </div>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm"
                onclick="document.getElementById('add-task-form').style.display='flex'">
            + Task</button>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm" id="zoom-out" title="Zoom out">−</button>
        <span id="zoom-level" style="font-size:0.75rem;min-width:2.5rem;text-align:center;">100%</span>
        <button class="btn btn-sm" id="zoom-in" title="Zoom in">+</button>
        <span class="htmx-indicator">Saving...</span>
    </div>

    <div id="add-task-form" class="add-task-form" style="display:none;">
        <form hx-post="/artifacts/{{ artifact_id }}/flow/create-task"
              hx-target="#flow-content"
              hx-swap="innerHTML"
              style="display:flex;gap:0.5rem;align-items:center;width:100%;">
            <input type="text" name="title" placeholder="Task title" required
                   class="edit-input" style="flex:1;" />
            <input type="date" name="start_date" class="edit-input" style="width:auto;" />
            <input type="date" name="end_date" class="edit-input" style="width:auto;" />
            <button type="submit" class="btn btn-sm btn-primary">Add</button>
            <button type="button" class="btn btn-sm"
                    onclick="this.closest('.add-task-form').style.display='none'">Cancel</button>
        </form>
    </div>

    <div id="drag-feedback" class="drag-feedback" style="display:none;">
        <span id="drag-feedback-text"></span>
    </div>

    <div id="drag-line" class="drag-line" style="display:none;"></div>

    <div id="flow-content" class="flow-content">
        {{ flow_html | safe }}
    </div>
</div>

<script>
(function() {
    var artifactId = '{{ artifact_id }}';
    var content = document.getElementById('flow-content');
    var feedback = document.getElementById('drag-feedback');
    var feedbackText = document.getElementById('drag-feedback-text');
    var line = document.getElementById('drag-line');

    var dragging = false;
    var sourceRow = null;
    var sourceId = null;
    var sourceHandle = null;
    var card = content.closest('.card');

    // --- Mousedown on .drag-handle starts the link gesture ---
    content.addEventListener('mousedown', function(e) {
        var handle = e.target.closest('.drag-handle');
        if (!handle) return;
        var row = handle.closest('[data-node-id]');
        if (!row) return;
        e.preventDefault();
        dragging = true;
        sourceRow = row;
        sourceHandle = handle;
        sourceId = row.getAttribute('data-node-id');
        row.classList.add('drag-source');
        feedback.style.display = 'flex';
        feedbackText.textContent = 'Release on another task to create dependency...';
        line.style.display = 'block';
        var rect = handle.getBoundingClientRect();
        var cRect = card.getBoundingClientRect();
        line.style.left = (rect.left + rect.width / 2 - cRect.left) + 'px';
        line.style.top = (rect.top + rect.height / 2 - cRect.top) + 'px';
        line.style.width = '0px';
        line.style.transform = 'rotate(0deg)';
    });

    // --- Mousemove: draw line + highlight targets ---
    document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        // Update line
        var handleRect = sourceHandle.getBoundingClientRect();
        var cRect = card.getBoundingClientRect();
        var x1 = handleRect.left + handleRect.width / 2 - cRect.left;
        var y1 = handleRect.top + handleRect.height / 2 - cRect.top;
        var x2 = e.clientX - cRect.left;
        var y2 = e.clientY - cRect.top;
        var dx = x2 - x1, dy = y2 - y1;
        var len = Math.sqrt(dx * dx + dy * dy);
        var angle = Math.atan2(dy, dx) * 180 / Math.PI;
        line.style.left = x1 + 'px';
        line.style.top = y1 + 'px';
        line.style.width = len + 'px';
        line.style.transform = 'rotate(' + angle + 'deg)';

        // Highlight drop target
        content.querySelectorAll('.drop-target').forEach(function(el) {
            el.classList.remove('drop-target');
        });
        var target = document.elementFromPoint(e.clientX, e.clientY);
        if (target) {
            var row = target.closest('[data-node-id]');
            if (row && row.getAttribute('data-node-id') !== sourceId) {
                row.classList.add('drop-target');
            }
        }
    });

    // --- Mouseup: complete or cancel ---
    document.addEventListener('mouseup', function(e) {
        if (!dragging) return;
        var target = document.elementFromPoint(e.clientX, e.clientY);
        var targetRow = target ? target.closest('[data-node-id]') : null;
        var targetId = targetRow ? targetRow.getAttribute('data-node-id') : null;

        if (targetId && targetId !== sourceId) {
            // Create dependency: source depends on target
            var form = document.createElement('form');
            form.style.display = 'none';
            form.setAttribute('hx-post',
                '/artifacts/' + artifactId + '/flow/set-dependency');
            form.setAttribute('hx-target', '#flow-content');
            form.setAttribute('hx-swap', 'innerHTML');
            var s = document.createElement('input');
            s.name = 'source_id'; s.value = sourceId;
            var t = document.createElement('input');
            t.name = 'target_id'; t.value = targetId;
            form.appendChild(s);
            form.appendChild(t);
            document.body.appendChild(form);
            htmx.process(form);
            htmx.trigger(form, 'submit');
            setTimeout(function() { form.remove(); }, 500);
        }
        cleanup();
    });

    // --- Escape key cancels ---
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && dragging) cleanup();
    });

    function cleanup() {
        dragging = false;
        sourceRow = null;
        sourceId = null;
        sourceHandle = null;
        feedback.style.display = 'none';
        line.style.display = 'none';
        content.querySelectorAll('.drag-source').forEach(function(el) {
            el.classList.remove('drag-source');
        });
        content.querySelectorAll('.drop-target').forEach(function(el) {
            el.classList.remove('drop-target');
        });
    }
})();
</script>

<script>
// List-view data grid navigation.
// Tab/Shift-Tab: handled by the browser natively (inputs are in DOM order).
// Arrow keys: move between rows. Enter: save. Escape: blur.
// Focus is restored after HTMX swaps via htmx:beforeRequest/afterSwap.
(function() {
    var content = document.getElementById('flow-content');
    if (!content) return;
    var pendingFocus = null;
    var pendingAction = null;

    // Before HTMX request: record which cell triggered it
    content.addEventListener('htmx:beforeRequest', function(e) {
        var el = e.detail.elt;
        if (el && el.dataset && el.dataset.row != null) {
            pendingFocus = {row: +el.dataset.row, col: +(el.dataset.col || 1)};
            pendingAction = el.dataset.action || null;
        }
    });

    // After HTMX swap: restore focus to the right cell
    content.addEventListener('htmx:afterSwap', function() {
        if (!pendingFocus) return;
        var row = pendingFocus.row;
        var col = pendingFocus.col;
        var max = maxRow();

        if (pendingAction === 'create') {
            row = max;  // new-row placeholder
            col = 1;
        } else if (pendingAction === 'delete') {
            if (row > max - 1) row = Math.max(max - 1, 0);
        }
        pendingFocus = null;
        pendingAction = null;
        requestAnimationFrame(function() { focusCell(row, col); });
    });

    // Editable column indices for Tab navigation (skip status/delete buttons)
    var tabCols = [1, 2, 3];

    // Arrow keys, Tab, Enter, Escape (delegated on #flow-content)
    content.addEventListener('keydown', function(e) {
        var el = e.target;
        if (!el.classList || !el.classList.contains('gc')) return;
        var row = +el.dataset.row, col = +el.dataset.col;

        if (e.key === 'Tab') {
            // Tab/Shift-Tab: move between grid columns, skipping date-input
            // internal segments (month/day/year) that trap native Tab.
            var idx = tabCols.indexOf(col);
            if (idx === -1) idx = 0;
            var mr = maxRow();
            if (e.shiftKey) {
                idx--;
                if (idx < 0) { row--; idx = tabCols.length - 1; }
                if (row < 0) { row = 0; idx = 0; }
            } else {
                idx++;
                if (idx >= tabCols.length) { row++; idx = 0; }
                if (row > mr) { row = mr; idx = tabCols.length - 1; }
            }
            var target = content.querySelector(
                '[data-row="'+row+'"][data-col="'+tabCols[idx]+'"]'
            );
            if (target) {
                e.preventDefault();
                target.focus();
                try { if (target.type === 'text' && target.select) target.select(); } catch(_) {}
            }
            // If no target found, let native Tab proceed (exits grid)
        } else if (e.key === 'ArrowDown' && el.type !== 'date') {
            e.preventDefault();
            focusCell(Math.min(row + 1, maxRow()), col);
        } else if (e.key === 'ArrowUp' && el.type !== 'date') {
            e.preventDefault();
            focusCell(Math.max(row - 1, 0), col);
        } else if (e.key === 'Enter') {
            if (el.dataset.action === 'create') return;
            e.preventDefault();
            if (el.tagName === 'INPUT') {
                htmx.trigger(el, 'save');
            }
        } else if (e.key === 'Escape') {
            el.blur();
        }
    });

    // Date inputs: convert native "change" to custom "save" for HTMX.
    content.addEventListener('change', function(e) {
        var el = e.target;
        if (el && el.type === 'date' && el.classList.contains('gc')) {
            htmx.trigger(el, 'save');
        }
    });

    function focusCell(row, col) {
        var el = content.querySelector('[data-row="'+row+'"][data-col="'+col+'"]');
        if (el) {
            el.focus();
            try { if (el.type === 'text' && el.select) el.select(); } catch(_) {}
        }
    }

    function maxRow() {
        var all = content.querySelectorAll('[data-row]');
        var m = 0;
        all.forEach(function(r) { var v = +r.dataset.row; if (v > m) m = v; });
        return m;
    }
})();
</script>

<script>
// DAG edge drawing — SVG bezier arrows between dependency nodes.
(function() {
    function drawDagEdges() {
        var container = document.querySelector('.dag-container');
        if (!container) return;
        var svg = container.querySelector('.dag-edges');
        if (!svg) return;
        svg.innerHTML = '';
        var nodes = container.querySelectorAll('.dag-node[data-deps]');
        var rect = container.getBoundingClientRect();

        nodes.forEach(function(node) {
            var deps = node.dataset.deps.trim();
            if (!deps) return;
            deps.split(' ').forEach(function(depId) {
                var dep = container.querySelector('[data-node-id="' + depId + '"]');
                if (!dep) return;
                var fromR = dep.getBoundingClientRect();
                var toR = node.getBoundingClientRect();
                // Draw from right-center of dependency to left-center of dependent
                var x1 = fromR.right - rect.left;
                var y1 = fromR.top + fromR.height / 2 - rect.top;
                var x2 = toR.left - rect.left;
                var y2 = toR.top + toR.height / 2 - rect.top;
                var cx = (x1 + x2) / 2;
                var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('class', 'dag-edge-path');
                path.setAttribute('d',
                    'M' + x1 + ',' + y1 +
                    ' C' + cx + ',' + y1 + ' ' + cx + ',' + y2 + ' ' + x2 + ',' + y2
                );
                svg.appendChild(path);
                var arrow = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                arrow.setAttribute('class', 'dag-edge-arrow');
                arrow.setAttribute('points',
                    (x2 + 6) + ',' + (y2 - 4) + ' ' +
                    (x2 + 6) + ',' + (y2 + 4) + ' ' +
                    x2 + ',' + y2
                );
                svg.appendChild(arrow);
            });
        });
    }

    // Draw on initial load
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', drawDagEdges);
    } else {
        requestAnimationFrame(drawDagEdges);
    }
    // Redraw after HTMX swaps
    var content = document.getElementById('flow-content');
    if (content) {
        content.addEventListener('htmx:afterSwap', function() {
            requestAnimationFrame(drawDagEdges);
        });
    }
})();
</script>

<script>
// Gantt bar positioning — compute left/width from date attributes.
(function() {
    function positionGanttBars() {
        var table = document.querySelector('.flow-gantt');
        if (!table) return;
        var tlStart = new Date(table.dataset.timelineStart);
        var tlEnd = new Date(table.dataset.timelineEnd);
        var range = tlEnd - tlStart;
        if (range <= 0) return;

        table.querySelectorAll('.gantt-bar').forEach(function(bar) {
            var s = new Date(bar.dataset.start);
            var e = new Date(bar.dataset.end);
            var left = ((s - tlStart) / range) * 100;
            var width = ((e - s) / range) * 100;
            bar.style.left = Math.max(0, left) + '%';
            bar.style.width = Math.max(1, width) + '%';
        });

        table.querySelectorAll('.gantt-milestone').forEach(function(ms) {
            var d = new Date(ms.dataset.date);
            var left = ((d - tlStart) / range) * 100;
            ms.style.left = Math.max(0, Math.min(100, left)) + '%';
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', positionGanttBars);
    } else {
        requestAnimationFrame(positionGanttBars);
    }
    var content = document.getElementById('flow-content');
    if (content) {
        content.addEventListener('htmx:afterSwap', function() {
            requestAnimationFrame(positionGanttBars);
        });
    }
})();
</script>

<script>
// Kanban drag-and-drop
(function() {
    function initKanban() {
        if (typeof Sortable === 'undefined') return;
        var columns = document.querySelectorAll('.kanban-column');
        var artifactId = '{{ artifact_id }}';
        columns.forEach(function(col) {
            if (col._sortable) return;
            col._sortable = Sortable.create(col, {
                group: 'kanban',
                draggable: '.kanban-card',
                ghostClass: 'block-ghost',
                animation: 150,
                onEnd: function(evt) {
                    var card = evt.item;
                    var newCol = evt.to;
                    var newStatus = newCol.dataset.status;
                    var taskId = card.dataset.nodeId;
                    if (taskId && newStatus) {
                        fetch('/artifacts/' + artifactId + '/flow/set-status', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                            body: new URLSearchParams({
                                node_id: taskId,
                                status: newStatus,
                                mode: 'kanban'
                            })
                        }).then(function(r) { return r.text(); }).then(function(html) {
                            var content = document.getElementById('flow-content');
                            content.innerHTML = html;
                            htmx.process(content);
                            initKanban();
                        });
                    }
                }
            });
        });
    }
    initKanban();
    var content = document.getElementById('flow-content');
    if (content) {
        content.addEventListener('htmx:afterSwap', function() {
            requestAnimationFrame(initKanban);
        });
    }
})();
</script>

<script>
// Zoom controls for flow content.
(function() {
    var KEY = 'flow-zoom-level';
    var zoomLevel = parseFloat(sessionStorage.getItem(KEY)) || 1.0;
    var content = document.getElementById('flow-content');
    var display = document.getElementById('zoom-level');
    var zoomIn = document.getElementById('zoom-in');
    var zoomOut = document.getElementById('zoom-out');
    if (!content) return;

    function applyZoom() {
        zoomLevel = Math.round(zoomLevel * 10) / 10;
        content.style.transform = 'scale(' + zoomLevel + ')';
        content.style.width = (100 / zoomLevel) + '%';
        if (display) display.textContent = Math.round(zoomLevel * 100) + '%';
        sessionStorage.setItem(KEY, zoomLevel);
    }

    applyZoom();

    if (zoomIn) zoomIn.addEventListener('click', function() {
        if (zoomLevel < 2.0) { zoomLevel += 0.1; applyZoom(); }
    });
    if (zoomOut) zoomOut.addEventListener('click', function() {
        if (zoomLevel > 0.5) { zoomLevel -= 0.1; applyZoom(); }
    });

    content.addEventListener('wheel', function(e) {
        if (!e.ctrlKey) return;
        e.preventDefault();
        if (e.deltaY < 0 && zoomLevel < 2.0) { zoomLevel += 0.1; applyZoom(); }
        else if (e.deltaY > 0 && zoomLevel > 0.5) { zoomLevel -= 0.1; applyZoom(); }
    }, { passive: false });
})();
</script>

<style>
.flow-content { padding: 0.5rem 0; transform-origin: top left; transition: transform 0.1s ease; }
.add-task-form { padding: 0.5rem 0.75rem; background: var(--bg-secondary, #f5f5f5); border-radius: 4px; margin-bottom: 0.5rem; }

/* Empty state */
.flow-empty { padding: 2rem; text-align: center; color: #888; }
.flow-empty p { margin: 0.25rem 0; }
.flow-empty-hint { font-size: 0.9rem; color: #aaa; }

/* Drag feedback banner */
.drag-feedback {
    padding: 0.35rem 0.75rem;
    background: #dbeafe;
    border: 1px solid #93c5fd;
    border-radius: 4px;
    margin-bottom: 0.5rem;
    align-items: center;
    font-size: 0.8rem;
    color: #1e40af;
}

/* Drag handle */
.drag-handle {
    cursor: grab; display: inline-block; margin-right: 0.4rem;
    padding: 0.1rem 0.2rem; font-size: 0.85rem; opacity: 0.4;
    user-select: none; border-radius: 3px;
}
.drag-handle:hover { opacity: 1; background: #e0e7ff; }
[data-node-id].drag-source { background: #dbeafe !important; outline: 2px solid #3b82f6; }
[data-node-id].drop-target { background: #d1fae5 !important; outline: 2px dashed #22c55e; }

/* Drag connector line */
.drag-line {
    position: absolute; height: 2px; background: #3b82f6;
    transform-origin: 0 50%; pointer-events: none; z-index: 100;
}

/* Dependency info in Gantt */
.task-dep-info {
    display: block; font-size: 0.65rem; color: #888;
    font-weight: normal; font-style: italic;
}

/* Dependency chips in deps view */
.dep-chip {
    display: inline-flex; align-items: center; gap: 0.25rem;
    background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 4px;
    padding: 0.05rem 0.3rem; font-size: 0.7rem; margin-right: 0.25rem;
}
.dep-remove {
    background: none; border: none; cursor: pointer; color: #999;
    font-size: 0.9rem; padding: 0 0.15rem; line-height: 1;
}
.dep-remove:hover { color: #e11d48; }

/* Gantt */
.flow-gantt { width: 100%; border-collapse: collapse; }
.flow-gantt th, .flow-gantt td { padding: 0.15rem 0.35rem; border-bottom: 1px solid #eee; text-align: left; }
.flow-gantt th { font-weight: 600; font-size: 0.75rem; color: #666; }
.task-name { white-space: nowrap; }
.task-name.status-done { text-decoration: line-through; color: #999; }
.task-name.status-in_progress { color: #2563eb; font-weight: 500; }
.gantt-cell { min-width: 200px; position: relative; height: 1.25rem; }
.gantt-bar { position: absolute; top: 50%; transform: translateY(-50%); height: 10px; background: #3b82f6; border-radius: 3px; min-width: 4px; }
.gantt-bar.status-done { background: #22c55e; }
.gantt-bar.status-in_progress { background: #f59e0b; }
.gantt-milestone { position: absolute; top: 50%; transform: translate(-50%, -50%); font-size: 0.85rem; color: #e11d48; }
.gantt-timeline-header { position: relative; min-width: 200px; }
.gantt-date-labels { position: relative; height: 0.75rem; }
.gantt-date-label { position: absolute; transform: translateX(-50%); font-size: 0.6rem; color: #999; white-space: nowrap; }

/* List-view data grid */
.flow-list-grid { width: 100%; border-collapse: collapse; }
.flow-list-grid thead th {
    font-weight: 600; font-size: 0.7rem; color: #999;
    text-transform: uppercase; letter-spacing: 0.03em;
    padding: 0.2rem 0.35rem; border-bottom: 2px solid #eee; text-align: left;
}
.flow-list-grid td { padding: 0.1rem 0.2rem; border-bottom: 1px solid #f0f0f0; }
.flow-list-grid tbody tr:hover { background: #f8f9fa; }
.col-status { width: 2rem; }
.col-date { width: 9rem; }
.col-actions { width: 2rem; }
.list-hidden { display: none; }

/* Grid cells — shared focus ring */
.flow-list-grid .gc:focus { outline: 2px solid #3b82f6; outline-offset: -1px; border-radius: 2px; }

/* Status toggle */
.flow-list-grid .list-check {
    background: none; border: none; cursor: pointer; font-size: 0.95rem;
    padding: 0.1rem 0.25rem; border-radius: 3px; line-height: 1;
}
.flow-list-grid .list-check:hover { background: #e0e7ff; }

/* Cell inputs — scoped under .flow-list-grid to beat the global
   input[type="text"] rule in style.css (specificity 0-1-1). */
.flow-list-grid .list-cell-input {
    border: 1px solid transparent; background: transparent;
    padding: 0.15rem 0.3rem; border-radius: 3px; font: inherit;
    width: 100%; box-sizing: border-box;
    margin: 0; box-shadow: none;
}
.flow-list-grid .list-cell-input:hover { border-color: #ddd; }
