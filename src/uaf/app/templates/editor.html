{% extends "base.html" %}
{% block title %}{{ title }} — UAF Editor{% endblock %}
{% block content %}
<div class="card">
    <div class="editor-header">
        <form hx-post="/artifacts/{{ artifact_id }}/rename"
              hx-target="#doc-content"
              hx-swap="innerHTML"
              style="flex:1;display:flex;gap:0.5rem;align-items:center;">
            <input type="text" name="title" value="{{ title }}"
                   class="editor-title"
                   hx-trigger="change"
                   hx-post="/artifacts/{{ artifact_id }}/rename"
                   hx-target="#doc-content"
                   hx-swap="innerHTML"
                   hx-include="this" />
        </form>
        <a href="/dashboard" class="btn btn-sm">Back</a>
        <a href="/api/artifacts/{{ artifact_id }}/export?format=markdown" class="btn btn-sm">Export .md</a>
        <button class="btn btn-sm no-print" onclick="window.print()">Print</button>
    </div>

    <div class="toolbar">
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/action/insert"
                hx-vals='{"style": "paragraph", "text": "New paragraph"}'
                hx-target="#doc-content"
                hx-swap="innerHTML">+ Paragraph</button>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/action/insert"
                hx-vals='{"style": "heading", "text": "New heading"}'
                hx-target="#doc-content"
                hx-swap="innerHTML">+ Heading</button>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/action/insert"
                hx-vals='{"style": "code_block", "text": "// code here"}'
                hx-target="#doc-content"
                hx-swap="innerHTML">+ Code Block</button>
        <span class="htmx-indicator">Saving...</span>
    </div>

    <div id="doc-content" class="doc-content">
        {% include "partials/doc_blocks.html" %}
    </div>
</div>
{% endblock %}
