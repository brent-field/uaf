{% extends "base.html" %}
{% block title %}{{ title }} — UAF Editor{% endblock %}
{% block content %}
<div class="card">
    <div class="editor-header">
        <form hx-post="/artifacts/{{ artifact_id }}/rename"
              hx-target="#doc-content"
              hx-swap="innerHTML"
              style="flex:1;display:flex;gap:0.5rem;align-items:center;">
            <input type="text" name="title" value="{{ title }}"
                   class="editor-title"
                   hx-trigger="change"
                   hx-post="/artifacts/{{ artifact_id }}/rename"
                   hx-target="#doc-content"
                   hx-swap="innerHTML"
                   hx-include="this" />
        </form>
        <div class="header-actions">
            <a href="/dashboard" class="btn btn-sm">Back</a>
            <div class="export-dropdown">
                <button class="btn btn-sm" onclick="this.nextElementSibling.classList.toggle('show')">Export</button>
                <div class="dropdown-menu">
                    <a href="/api/artifacts/{{ artifact_id }}/export?format=markdown">.md</a>
                    <a href="/api/artifacts/{{ artifact_id }}/export?format=plaintext">.txt</a>
                    <a href="/api/artifacts/{{ artifact_id }}/export?format=latex">.tex</a>
                    <a href="/api/artifacts/{{ artifact_id }}/export?format=docx">.docx</a>
                </div>
            </div>
            <button class="btn btn-sm no-print" onclick="window.print()">Print</button>
        </div>
    </div>

    <div class="toolbar">
        <div class="view-toggle">
            <button class="btn btn-sm view-mode-btn active"
                    id="btn-semantic"
                    hx-get="/artifacts/{{ artifact_id }}/blocks?mode=semantic"
                    hx-target="#doc-content"
                    hx-swap="innerHTML"
                    onclick="document.getElementById('btn-semantic').classList.add('active');document.getElementById('btn-layout').classList.remove('active');">
                Semantic</button>
            <button class="btn btn-sm view-mode-btn"
                    id="btn-layout"
                    hx-get="/artifacts/{{ artifact_id }}/blocks?mode=layout"
                    hx-target="#doc-content"
                    hx-swap="innerHTML"
                    onclick="document.getElementById('btn-layout').classList.add('active');document.getElementById('btn-semantic').classList.remove('active');">
                Layout</button>
        </div>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/undo"
                hx-target="#doc-content"
                hx-swap="innerHTML"
                title="Undo (Ctrl+Z)">Undo</button>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/redo"
                hx-target="#doc-content"
                hx-swap="innerHTML"
                title="Redo (Ctrl+Shift+Z)">Redo</button>
        <span class="toolbar-sep"></span>
        <button class="btn btn-sm"
                hx-post="/artifacts/{{ artifact_id }}/action/insert-at"
                hx-vals='{"position": "999", "style": "paragraph", "text": ""}'
                hx-target="#doc-content"
                hx-swap="innerHTML">+ Block</button>
        <span class="htmx-indicator">Saving...</span>
    </div>

    <div id="doc-content" class="doc-content">
        {% include "partials/doc_blocks.html" %}
    </div>
    <div id="slash-menu" class="slash-menu" style="display:none;"></div>
    <div id="format-toolbar" class="format-toolbar" style="display:none;">
        <button type="button" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
        <button type="button" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
        <button type="button" data-cmd="code" title="Code"><code>&lt;&gt;</code></button>
    </div>
</div>
<script src="/static/editor-core.js"></script>
<script src="/static/layout-inspector.js"></script>
<script src="/static/doc-editor.js"></script>
<script>
UAF.initUndoShortcuts('{{ artifact_id }}', 'doc-content');
</script>
<script>
// Close export dropdown when clicking outside
document.addEventListener('click', function(e) {
    if (!e.target.closest('.export-dropdown')) {
        document.querySelectorAll('.dropdown-menu.show').forEach(function(m) { m.classList.remove('show'); });
    }
});
</script>
{% endblock %}
