<div class="sidebar-inner">
    <div class="sidebar-search-row">
        <input type="text" class="sidebar-search" placeholder="Search..."
               name="q" value="{{ q }}"
               hx-get="/sidebar" hx-trigger="input changed delay:200ms"
               hx-target="#sidebar" hx-swap="innerHTML" />
        <div class="sidebar-new-dropdown">
            <button class="sidebar-new-btn" onclick="this.nextElementSibling.classList.toggle('show')">+</button>
            <div class="dropdown-menu sidebar-dropdown">
                <form method="post" action="/artifacts/create">
                    <button type="submit" class="dropdown-item">Document</button>
                </form>
                <form method="post" action="/artifacts/create-spreadsheet">
                    <button type="submit" class="dropdown-item">Spreadsheet</button>
                </form>
                <form method="post" action="/artifacts/create-project">
                    <button type="submit" class="dropdown-item">Project</button>
                </form>
            </div>
        </div>
    </div>

    <div class="sidebar-label">Recent</div>
    {% for item in items %}
    <a href="{{ item.url }}" class="sidebar-item {% if item.active %}sidebar-item-active{% endif %}">
        <span class="sidebar-type-dot sidebar-dot-{{ item.artifact_type }}"></span>
        <span class="sidebar-item-label">{{ item.label }}</span>
    </a>
    {% endfor %}
    {% if not items %}
    <div class="sidebar-empty">No artifacts yet</div>
    {% endif %}

    <a href="/dashboard" class="sidebar-all-link">All artifacts</a>
</div>
