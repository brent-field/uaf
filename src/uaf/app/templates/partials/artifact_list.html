{% if artifacts %}
<ul class="artifact-list" id="artifact-list">
    {% for art in artifacts %}
    <li class="artifact-item">
        <div>
            <a href="/artifacts/{{ art.id }}/edit">{{ art.title }}</a>
            <div class="meta">{{ art.child_count }} blocks &middot; {{ art.updated_at.strftime('%b %d, %H:%M') }}</div>
        </div>
        <div class="artifact-actions">
            <a href="/artifacts/{{ art.id }}/edit" class="btn btn-sm">Edit Doc</a>
            <a href="/artifacts/{{ art.id }}/grid" class="btn btn-sm">Grid View</a>
            <a href="/api/artifacts/{{ art.id }}/export?format=markdown" class="btn btn-sm">Export</a>
            <button class="btn btn-sm btn-danger"
                    hx-delete="/artifacts/{{ art.id }}"
                    hx-target="#artifact-list"
                    hx-swap="outerHTML"
                    hx-confirm="Delete '{{ art.title }}'?">Delete</button>
        </div>
    </li>
    {% endfor %}
</ul>
{% else %}
<div class="empty-state">
    <p>No artifacts yet. Create one to get started.</p>
</div>
{% endif %}
